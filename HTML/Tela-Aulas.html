<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../JS/gerarFooterEMenu.js" defer></script>
    <link rel="stylesheet" href="../CSS/footermenu.css">
    <link rel="stylesheet" href="../CSS/Tela-Aulas.css">
    <link rel="icon" href="../IMG/logovid.png" type="image/png">
    <title>Aulas</title>

<body>
    <!-- Menu -->
    <nav>
    </nav>

    <div class="cursos-container">

        <div class="Tela-Cursao">
            <h1>Cursão</h1>
            <p>Curso de maturidade no espírito</p>
            <div class="Tela-Cadastro">
                <div class="cabecalho">
                    <h1>Faça a sua matrícula</h1>
                </div>
                <div class="inputs">
                    <div class="nome-ipt">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" placeholder="Seu nome completo">
                    </div>
                    <div class="idade-ipt">
                        <label for="idade">Sua idade</label>
                        <input type="number" id="idade" placeholder="12 anos pra cima">
                    </div>
                </div>
                <div class="botoes">
                    <button onclick="matricularCursao()">Matricular</button>
                </div>
                <div class="links">
                    <p>Quer ver os matriculados? <a href="../HTML/Tabela-matricula.html" target="_blank">Clique aqui</a></p>
                </div>
            </div>
        </div>

        <div class="Tela-CTL">
            <h1>CTL</h1>
            <p>Curso de treinamento para líderes</p>
            <div class="Tela-Cadastro">
                <div class="cabecalho">
                    <h1>Faça a sua matrícula</h1>
                </div>
                <div class="inputs">
                    <div class="nome-ipt">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" placeholder="Seu nome completo">
                    </div>
                    <div class="idade-ipt">
                        <label for="idade">Sua idade</label>
                        <input type="number" id="idade" placeholder="12 anos pra cima">
                    </div>
                </div>
                <div class="botoes">
                    <button onclick="matricularCTL()">Matricular</button>
                </div>
                <div class="links">
                    <p>Quer ver os matriculados? <a href="../HTML/Tabela-matricula.html" target="_blank">Clique aqui</a></p>
                </div>
            </div>
        </div>

    </div>
    
    <footer>
    </footer>
    <script src="../JS/Tela-Aulas.js"></script>
</body>

</html>
